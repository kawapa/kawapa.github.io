<h1>Notatki</h1><br>

{% assign sorted_posts = site.posts | sort: 'title' %}
{% for post in sorted_posts %}
  {% if post.draft == true %}
    <div class="blog-posts">
      <div>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </div>
    </div>
  {% endif %}
{% endfor %}
